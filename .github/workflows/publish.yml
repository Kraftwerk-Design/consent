name: Publish to npm

# Publishes @kraftwerkdesign/consent when a GitHub Release is published.
# Auth is OIDC "trusted publishing" — no NPM_TOKEN secret, provenance is
# generated automatically. Configure the trusted publisher once at:
#   npmjs.com > package settings > Trusted Publisher (see README/notes).

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false # never cache in release builds

      # Node 24 bundles npm 11.x, which supports OIDC trusted publishing.
      # We intentionally do NOT self-upgrade npm here: `npm install -g npm@latest`
      # intermittently corrupts the in-place install on the runners, leaving
      # libnpmpublish without its `sigstore` dep and failing publish with
      # "Cannot find module 'sigstore'".

      - name: Install dependencies
        run: npm ci

      - name: Verify release tag matches package.json version
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG="${{ github.event.release.tag_name }}"
          TAG_VERSION="${TAG#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Release tag ($TAG) does not match package.json version ($PKG_VERSION). Bump package.json and re-tag."
            exit 1
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      # OIDC trusted publishing: no NODE_AUTH_TOKEN needed, provenance automatic.
      # access:public comes from package.json publishConfig.
      - name: Publish
        run: npm publish
